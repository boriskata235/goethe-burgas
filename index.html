<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гьоте Гимназия Бургас — 3D Лого</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            color: white;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 800px;
        }
        
        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            opacity: 0.7;
            margin-bottom: 20px;
            font-style: italic;
        }
        
        #model-viewer-container {
            width: 100%;
            height: 70vh;
            min-height: 400px;
            position: relative;
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
            background: transparent;
            --poster-color: transparent;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .footer {
            position: fixed;
            bottom: 15px;
            font-size: 0.8rem;
            opacity: 0.6;
            text-align: center;
            width: 100%;
        }
        
        .hint {
            margin-top: 15px;
            font-size: 0.85rem;
            opacity: 0.6;
        }
    </style>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Goethe Gymnasium</h1>
        <div class="subtitle">Бургас</div>
        
        <div id="model-viewer-container">
            <model-viewer 
                src="goethe_logo.glb"
                alt="3D лого на Гьоте Гимназия"
                auto-rotate
                auto-rotate-delay="0"
                rotation-per-second="30deg"
                camera-controls
                touch-action="pan-y"
                shadow-intensity="1"
                exposure="1.2"
                environment-image="neutral"
                camera-orbit="90deg 90deg 1.5m"
                min-camera-orbit="auto auto 0.8m"
                max-camera-orbit="auto auto 3m">
                <div class="loading" slot="poster">
                    <div class="spinner"></div>
                    <div>Зареждане на модела...</div>
                </div>
            </model-viewer>
        </div>
        
        <div class="hint">↻ Завъртете с пръст / мишка | 🔍 Приближете с щипка</div>
    </div>
    
    <div class="footer">Goethe Gymnasium Burgas © 2026</div>
</body>
</html>
